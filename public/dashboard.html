<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard | AI Interview Coach</title>
    <link rel="stylesheet" href="css/style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        /* Profile row */
        .profile-row {
            display: flex;
            align-items: center;
            justify-content: space-between;
            background: var(--card-bg);
            border: 1px solid var(--border);
            border-radius: 14px;
            padding: 1.5rem 2rem;
            margin-bottom: 2rem;
        }

        .profile-row .user-details {
            display: flex;
            align-items: center;
            gap: 1rem;
        }

        .profile-row .avatar {
            width: 48px;
            height: 48px;
            background: linear-gradient(135deg, var(--primary), var(--primary-dark));
            border-radius: 12px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.2rem;
            color: #fff;
        }

        .profile-row .name {
            font-weight: 700;
            font-size: 1.1rem;
            color: var(--text-bright);
        }

        .profile-row .email {
            color: var(--text-muted);
            font-size: 0.8rem;
        }

        /* Action cards row */
        .action-row {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 1.25rem;
            margin-bottom: 2.5rem;
        }

        .action-card {
            background: var(--card-bg);
            border: 1px solid var(--border);
            border-radius: 14px;
            padding: 2rem;
            text-align: center;
            cursor: pointer;
            text-decoration: none;
            transition: all 0.25s;
        }

        .action-card:hover {
            border-color: var(--primary);
            transform: translateY(-3px);
            box-shadow: 0 12px 30px rgba(0, 0, 0, 0.3);
        }

        .action-card .icon-circle {
            width: 56px;
            height: 56px;
            border-radius: 14px;
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 0 auto 1rem;
            font-size: 1.4rem;
        }

        .action-card h3 {
            margin-bottom: 0.3rem;
            font-size: 1rem;
        }

        .action-card p {
            color: var(--text-muted);
            font-size: 0.8rem;
        }

        /* Section header */
        .section-header {
            display: flex;
            align-items: center;
            gap: 0.6rem;
            margin-bottom: 1.25rem;
            font-size: 1.1rem;
            font-weight: 700;
            color: var(--text-bright);
        }

        .section-header i {
            color: var(--primary);
        }

        /* Interview list items */
        #interviewList {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 1rem;
        }

        /* Detail View */
        #detailView .back-bar {
            margin-bottom: 1.5rem;
        }

        .scores-grid {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 1rem;
            margin-bottom: 2rem;
        }

        .score-card {
            padding: 1.5rem;
            border-radius: 14px;
            text-align: center;
        }

        .score-card .label {
            font-size: 0.75rem;
            color: var(--text-muted);
            text-transform: uppercase;
            letter-spacing: 0.5px;
            margin-bottom: 0.3rem;
        }

        .score-card .value {
            font-size: 2.2rem;
            font-weight: 800;
        }

        .detail-panels {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 1.25rem;
        }

        .detail-panel {
            background: var(--card-bg);
            border: 1px solid var(--border);
            border-radius: 14px;
            padding: 1.5rem;
        }

        .detail-panel h4 {
            margin-bottom: 0.75rem;
            display: flex;
            align-items: center;
            gap: 0.5rem;
        }

        .detail-panel h4 i {
            color: var(--primary);
            font-size: 0.9rem;
        }

        .detail-panel.full-width {
            grid-column: 1 / -1;
        }

        @media (max-width: 768px) {
            .action-row {
                grid-template-columns: 1fr;
            }

            #interviewList {
                grid-template-columns: 1fr;
            }

            .detail-panels {
                grid-template-columns: 1fr;
            }
        }
    </style>
</head>

<body>
    <!-- Top Bar -->
    <div class="topbar">
        <div class="brand">
            <i class="fas fa-robot"></i>
            <span>AI <em>Interview Coach</em></span>
        </div>
        <div class="nav-right">
            <a href="dashboard.html" class="nav-link" style="color: var(--primary);"><i class="fas fa-th-large"></i>
                Dashboard</a>
            <button id="logoutBtn" class="btn btn-logout"><i class="fas fa-sign-out-alt"></i> Logout</button>
        </div>
    </div>

    <div class="page-content">
        <div id="alert" class="alert"></div>

        <!-- Profile Row -->
        <div class="profile-row">
            <div class="user-details">
                <div class="avatar"><i class="fas fa-user"></i></div>
                <div>
                    <div id="userName" class="name">Loading...</div>
                    <div id="userEmail" class="email">Loading...</div>
                </div>
            </div>
        </div>

        <!-- Action Card -->
        <div style="margin-bottom: 2.5rem;">
            <a href="jd-compare.html" class="action-card" style="display: block;">
                <div class="icon-circle" style="background: rgba(var(--primary-rgb), 0.12); color: var(--primary);">
                    <i class="fas fa-rocket"></i>
                </div>
                <h3>Start New Interview</h3>
                <p>Compare JD, upload resume, and begin your AI mock interview</p>
            </a>
        </div>

        <!-- Master View: Interview List -->
        <div id="masterView">
            <div class="section-header"><i class="fas fa-history"></i> Your Interviews</div>
            <div id="interviewList">
                <p style="color: var(--text-muted); grid-column: 1/-1;">Loading...</p>
            </div>
        </div>

        <!-- Detail View -->
        <div id="detailView" style="display: none;">
            <div class="back-bar">
                <button id="backToListBtn" class="btn btn-secondary"
                    style="padding: 0.5rem 1.25rem; font-size: 0.85rem;">
                    <i class="fas fa-arrow-left"></i> Back to Interviews
                </button>
            </div>
            <h3 id="detailTitle" style="margin-bottom: 1.5rem; font-size: 1.3rem;">Interview Feedback</h3>

            <!-- Score Cards -->
            <div class="scores-grid">
                <div class="score-card"
                    style="background: linear-gradient(135deg, rgba(var(--primary-rgb),0.15), rgba(var(--primary-rgb),0.04));">
                    <div class="label">Confidence Score</div>
                    <div id="confidenceScore" class="value" style="color: var(--primary);">--</div>
                </div>
                <div class="score-card"
                    style="background: linear-gradient(135deg, rgba(16,185,129,0.15), rgba(16,185,129,0.04));">
                    <div class="label">Content Quality</div>
                    <div id="contentQuality" class="value" style="color: var(--success);">--</div>
                </div>
            </div>

            <!-- Detail Panels -->
            <div class="detail-panels">
                <div class="detail-panel">
                    <h4><i class="fas fa-chart-line"></i> Speech Clarity</h4>
                    <canvas id="speechChart" height="200"></canvas>
                </div>
                <div class="detail-panel">
                    <h4><i class="fas fa-face-smile"></i> Expression Timeline</h4>
                    <div id="expressionTimeline" style="display: flex; gap: 0.4rem; flex-wrap: wrap;"></div>
                </div>
                <div class="detail-panel full-width">
                    <h4><i class="fas fa-list-check"></i> Question Breakdown</h4>
                    <div id="questionBreakdown"></div>
                </div>
            </div>
        </div>
    </div>
    <script src="js/app.js"></script>
</body>

</html>
