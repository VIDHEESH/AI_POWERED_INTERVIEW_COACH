<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login | AI Interview Coach</title>
    <link rel="stylesheet" href="css/style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
    <style>
        .auth-layout {
            display: grid;
            grid-template-columns: 1fr 1fr;
            min-height: 100vh;
        }

        /* Left: branding panel */
        .auth-brand {
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            padding: 4rem;
            background: linear-gradient(160deg, #eff6ff 0%, #ffffff 100%);
            border-right: 1px solid var(--border);
            text-align: center;
        }

        .auth-brand .logo {
            width: 80px;
            height: 80px;
            background: linear-gradient(135deg, var(--primary), var(--primary-dark));
            border-radius: 20px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 2.2rem;
            color: #fff;
            margin-bottom: 2rem;
            box-shadow: 0 12px 30px rgba(var(--primary-rgb), 0.2);
        }

        .auth-brand h1 {
            font-size: 2.4rem;
            margin-bottom: 0.5rem;
            background: linear-gradient(135deg, var(--primary-dark) 0%, var(--primary) 100%);
            -webkit-background-clip: text;
            background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .auth-brand .tagline {
            color: var(--text-muted);
            font-size: 1rem;
            margin-bottom: 3rem;
            max-width: 360px;
        }

        .auth-features {
            display: flex;
            gap: 2.5rem;
        }

        .auth-features .feat {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 0.5rem;
        }

        .auth-features .feat .icon-wrap {
            width: 48px;
            height: 48px;
            background: rgba(var(--primary-rgb), 0.12);
            border: 1px solid rgba(var(--primary-rgb), 0.2);
            border-radius: 12px;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .auth-features .feat .icon-wrap i {
            font-size: 1.2rem;
            color: var(--primary);
        }

        .auth-features .feat span {
            color: var(--text-muted);
            font-size: 0.75rem;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        /* Right: form panel */
        .auth-form-panel {
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            padding: 4rem;
        }

        .auth-form-box {
            width: 100%;
            max-width: 420px;
        }

        .auth-form-box h2 {
            font-size: 1.8rem;
            font-weight: 800;
            color: var(--text-bright);
            margin-bottom: 0.3rem;
            background: none;
            -webkit-text-fill-color: var(--text-bright);
        }

        .auth-form-box .sub {
            color: var(--text-muted);
            font-size: 0.9rem;
            margin-bottom: 2rem;
        }

        .auth-form-box .btn-primary {
            width: 100%;
            padding: 0.95rem;
            font-size: 1rem;
            margin-top: 0.5rem;
        }

        @media (max-width: 900px) {
            .auth-layout {
                grid-template-columns: 1fr;
            }

            .auth-brand {
                display: none;
            }

            .auth-form-panel {
                padding: 2rem;
            }
        }
    </style>
</head>

<body>
    <div class="auth-layout">
        <!-- Left: Branding -->
        <div class="auth-brand">
            <div class="logo"><i class="fas fa-robot"></i></div>
            <h1>AI Interview Coach</h1>
            <p class="tagline">AI-Powered platform for Career Growth & Interview Assistance</p>
            <div class="auth-features">
                <div class="feat">
                    <div class="icon-wrap"><i class="fas fa-microphone"></i></div>
                    <span>Voice Analysis</span>
                </div>
                <div class="feat">
                    <div class="icon-wrap"><i class="fas fa-face-smile"></i></div>
                    <span>Expression Detection</span>
                </div>
                <div class="feat">
                    <div class="icon-wrap"><i class="fas fa-brain"></i></div>
                    <span>AI Feedback</span>
                </div>
            </div>
        </div>

        <!-- Right: Login Form -->
        <div class="auth-form-panel">
            <div class="auth-form-box">
                <h2>Welcome Back</h2>
                <p class="sub">Sign in to continue to your dashboard</p>

                <div id="alert" class="alert"></div>

                <form id="loginForm">
                    <div class="form-group">
                        <label for="email">Email Address</label>
                        <input type="email" id="email" required placeholder="you@example.com">
                    </div>
                    <div class="form-group">
                        <label for="password">Password</label>
                        <input type="password" id="password" required placeholder="••••••••">
                    </div>
                    <button type="submit" class="btn btn-primary">Sign In</button>
                </form>

                <div class="link-text">
                    Don't have an account? <a href="register.html">Create one</a>
                </div>
            </div>
        </div>
    </div>
    <script src="js/app.js"></script>
</body>

</html>
