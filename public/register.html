<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Register | AI Interview Coach</title>
    <link rel="stylesheet" href="css/style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
    <style>
        .auth-layout {
            display: grid;
            grid-template-columns: 1fr 1fr;
            min-height: 100vh;
        }

        .auth-brand {
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            padding: 4rem;
            background: linear-gradient(160deg, #eff6ff 0%, #ffffff 100%);
            border-right: 1px solid var(--border);
            text-align: center;
        }

        .auth-brand .logo {
            width: 80px;
            height: 80px;
            background: linear-gradient(135deg, var(--primary), var(--primary-dark));
            border-radius: 20px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 2.2rem;
            color: #fff;
            margin-bottom: 2rem;
            box-shadow: 0 12px 30px rgba(var(--primary-rgb), 0.2);
        }

        .auth-brand h1 {
            font-size: 2.4rem;
            margin-bottom: 0.5rem;
            background: linear-gradient(135deg, var(--primary-dark) 0%, var(--primary) 100%);
            -webkit-background-clip: text;
            background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .auth-brand .tagline {
            color: var(--text-muted);
            font-size: 1rem;
            max-width: 360px;
        }

        .auth-form-panel {
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            padding: 4rem;
        }

        .auth-form-box {
            width: 100%;
            max-width: 420px;
        }

        .auth-form-box h2 {
            font-size: 1.8rem;
            font-weight: 800;
            color: var(--text-bright);
            margin-bottom: 0.3rem;
            background: none;
            -webkit-text-fill-color: var(--text-bright);
        }

        .auth-form-box .sub {
            color: var(--text-muted);
            font-size: 0.9rem;
            margin-bottom: 2rem;
        }

        .auth-form-box .btn-primary {
            width: 100%;
            padding: 0.95rem;
            font-size: 1rem;
            margin-top: 0.5rem;
        }

        @media (max-width: 900px) {
            .auth-layout {
                grid-template-columns: 1fr;
            }

            .auth-brand {
                display: none;
            }

            .auth-form-panel {
                padding: 2rem;
            }
        }
    </style>
</head>

<body>
    <div class="auth-layout">
        <!-- Left: Branding -->
        <div class="auth-brand">
            <div class="logo"><i class="fas fa-user-plus"></i></div>
            <h1>AI Interview Coach</h1>
            <p class="tagline">Create your account and start preparing for interviews with AI-powered analysis.</p>
        </div>

        <!-- Right: Register Form -->
        <div class="auth-form-panel">
            <div class="auth-form-box">
                <h2>Create Account</h2>
                <p class="sub">Start your AI-powered interview journey</p>

                <div id="alert" class="alert"></div>

                <form id="registerForm">
                    <div class="form-group">
                        <label for="name">Full Name</label>
                        <input type="text" id="name" required placeholder="John Doe">
                    </div>
                    <div class="form-group">
                        <label for="email">Email Address</label>
                        <input type="email" id="email" required placeholder="you@example.com">
                    </div>
                    <div class="form-group">
                        <label for="password">Password</label>
                        <input type="password" id="password" required placeholder="Min. 6 characters">
                    </div>
                    <button type="submit" class="btn btn-primary">Sign Up</button>
                </form>

                <div class="link-text">
                    Already have an account? <a href="index.html">Sign in</a>
                </div>
            </div>
        </div>
    </div>
    <script src="js/app.js"></script>
</body>

</html>
